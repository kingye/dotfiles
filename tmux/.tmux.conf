# This is the Alacritty configuration file. It is written in TOML format.
# ~/.tmux.conf
unbind r
bind r source-file ~/.tmux.conf 

set -g prefix C-s
# act like vim
set -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# 启用鼠标支持
set -g mouse on
# 允许用鼠标拖动调整窗格大小
# set -g mouse-resize-pane on

#resize panes with arrow keys
bind-key -r Up resize-pane -U 5
bind-key -r Down resize-pane -D 5
bind-key -r Left resize-pane -L 5
bind-key -r Right resize-pane -R 5

#hide and show pane
bind-key ! break-pane -d -n _hidden_pane
bind-key H join-pane -hs $.0
bind-key V join-pane -vs $.0

bind-key Space next-layout

#split with current pane path
bind-key % split-window -c "#{pane_current_path}" -h
bind-key '"' split-window -c '#{pane_current_path}' 

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-sessionist'
# set -g @plugin 'alexwforsythe/tmux-which-key'
# set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# switch off the automatic restore of tmux sessions on tmux start, since it can be a bit annoying
set -g @continuum-restore 'off'

run ~/.tmux/plugins/catppuccin/rose-pine.tmux
set -g @rose_pine_variant 'moon'
# set -g status-position bottom
set -g status off
set -s set-clipboard on

# initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
